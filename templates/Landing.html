<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Prompt</title>
  <style>
    :root {
      --bg: #05070c;
      --glass: rgba(18, 22, 32, 0.7);
      --card: rgba(15, 19, 28, 0.9);
      --accent: #7cf2d4;
      --accent-2: #4da1ff;
      --text: #f6f7fb;
      --muted: #9aabc0;
      --border: rgba(255, 255, 255, 0.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 15% 20%, rgba(124, 242, 212, 0.08), transparent 40%),
                  radial-gradient(circle at 80% 10%, rgba(77, 161, 255, 0.1), transparent 40%),
                  linear-gradient(140deg, #05070c 0%, #0b0f18 50%, #05070c 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(124, 242, 212, 0.18), transparent 55%);
      filter: blur(40px);
      top: -120px;
      left: -90px;
      animation: float 10s ease-in-out infinite;
      z-index: 0;
    }
    .glow.b {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(77, 161, 255, 0.16), transparent 60%);
      bottom: -140px;
      right: -120px;
      top: auto;
      left: auto;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(14px); }
    }
    .shell {
      position: relative;
      width: min(1200px, 100%);
      z-index: 1;
    }
    .header { text-align: center; margin-bottom: 18px; }
    .brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: 0.4px; }
    .pulse { width: 12px; height: 12px; border-radius: 50%; background: linear-gradient(120deg, var(--accent), var(--accent-2)); box-shadow: 0 0 14px rgba(124, 242, 212, 0.8); animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 12px rgba(124, 242, 212, 0.7); } 50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(77, 161, 255, 0.7); } 100% { transform: scale(1); box-shadow: 0 0 12px rgba(124, 242, 212, 0.7); } }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); max-width: 720px; margin: 0 auto; }
    h1 { margin: 0; font-size: 26px; letter-spacing: -0.3px; text-align: center; }
    .muted { color: var(--muted); }
    .panel { background: var(--glass); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-size: 15px;
      min-height: 180px;
      resize: vertical;
    }
    button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #02060d; font-weight: 700; cursor: pointer; font-size: 15px; box-shadow: 0 12px 40px rgba(77, 161, 255, 0.35); transition: transform 0.1s ease, box-shadow 0.2s ease; }
    button:hover { transform: translateY(-1px); box-shadow: 0 16px 45px rgba(124, 242, 212, 0.35); }
    .log { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-family: "JetBrains Mono", monospace; color: var(--muted); min-height: 200px; white-space: pre-wrap; overflow: auto; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow b"></div>
  <div class="shell">
    <div class="header">
      <div class="brand"><span class="pulse"></span>RAG Prompt</div>
    </div>
    <div class="card">
      <div class="panel">
        <h1>Ask your question</h1>
        <p class="muted" style="text-align:center;">Type a prompt and view the model response with context.</p>
        <div style="margin-top:14px;">
          <label for="query">Prompt</label>
          <textarea id="query" placeholder="Ask your question...">What is Kubernetes?</textarea>
        </div>
        <div style="margin-top:14px;">
          <button id="send">Send</button>
        </div>
        <div class="panel" style="margin-top:14px;">
          <div class="log" id="responseLog">Waiting for request...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const logEl = document.getElementById("responseLog");

    async function sendQuery() {
      const query = document.getElementById("query").value.trim();
      if (!query) {
        logEl.textContent = "Enter a query first.";
        return;
      }
      logEl.textContent = "Awaiting response...";
      try {
        const url = `/query?q=${encodeURIComponent(query)}`;
        const res = await fetch(url, { method: "POST" });
        const text = await res.text();
        try {
          const json = JSON.parse(text);
          logEl.textContent = JSON.stringify(json, null, 2);
        } catch {
          logEl.textContent = text;
        }
      } catch (err) {
        logEl.textContent = "Request failed: " + err.message;
      }
    }

    document.getElementById("send").addEventListener("click", sendQuery);
    document.getElementById("query").addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") sendQuery();
    });
  </script>
</body>
</html>
